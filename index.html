<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RomeBot – By Cristian Romero Digital</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ebe2;
    --border: #e2d9cc;
    --accent: #b5651d;
    --accent2: #d4845a;
    --accent-dim: rgba(181,101,29,0.10);
    --text: #2a1f14;
    --text-muted: #9a8878;
    --user-bubble: #2a1f14;
    --radius: 16px;
    --danger: #e53e3e;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
  body::before { content:''; position:fixed; bottom:0; right:0; width:55%; height:55%; background:radial-gradient(ellipse at bottom right,rgba(181,101,29,0.05) 0%,transparent 70%); pointer-events:none; z-index:0; }

  /* HEADER */
  header { position:relative; flex-shrink:0; overflow:hidden; border-bottom:1px solid rgba(0,0,0,0.2); z-index:10; min-height:70px; }
  .header-banner { position:absolute; inset:0; background-size:cover; background-position:center 30%; background-repeat:no-repeat; filter:brightness(0.72); }
  .header-overlay { position:absolute; inset:0; background:linear-gradient(90deg,rgba(5,5,10,0.85) 0%,rgba(5,5,10,0.5) 55%,rgba(5,5,10,0.18) 100%); }
  .header-content { position:relative; z-index:2; display:flex; align-items:center; gap:12px; padding:12px 20px; }
  .logo-wrap { width:44px; height:44px; border-radius:50%; overflow:hidden; flex-shrink:0; background:rgba(255,255,255,0.1); border:1.5px solid rgba(255,255,255,0.25); box-shadow:0 0 16px rgba(6,182,212,0.3); }
  .logo-wrap img { width:100%; height:100%; object-fit:cover; }
  .header-info h1 { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:600; color:#fff; letter-spacing:0.02em; text-shadow:0 1px 8px rgba(0,0,0,0.6); }
  .header-info .slogan { font-size:0.67rem; color:rgba(6,182,212,0.9); letter-spacing:0.1em; text-transform:uppercase; margin-top:2px; text-shadow:0 0 12px rgba(6,182,212,0.5); }
  .header-right { margin-left:auto; display:flex; align-items:center; gap:8px; }
  .lang-toggle { display:flex; gap:3px; background:rgba(255,255,255,0.12); border-radius:8px; padding:3px; border:1px solid rgba(255,255,255,0.15); }
  .lang-btn { padding:4px 10px; border-radius:5px; border:none; background:transparent; color:rgba(255,255,255,0.6); font-size:0.69rem; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; font-weight:500; }
  .lang-btn.active { background:rgba(6,182,212,0.7); color:#fff; }
  .panel-btn { padding:5px 11px; border-radius:7px; border:1px solid rgba(255,255,255,0.2); background:rgba(255,255,255,0.1); color:rgba(255,255,255,0.8); font-size:0.69rem; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; }
  .panel-btn:hover { background:rgba(255,255,255,0.2); }
  .status-dot { display:flex; align-items:center; gap:5px; font-size:0.67rem; color:rgba(255,255,255,0.45); }
  .dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; animation:pulse 2s infinite; }
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* TABS */
  .tabs { display:flex; background:var(--surface); border-bottom:1px solid var(--border); flex-shrink:0; z-index:9; position:relative; }
  .tab { flex:1; padding:10px; font-size:0.78rem; font-family:'Outfit',sans-serif; color:var(--text-muted); background:none; border:none; border-bottom:2px solid transparent; cursor:pointer; transition:all 0.2s; font-weight:400; }
  .tab.active { color:var(--accent); border-bottom-color:var(--accent); font-weight:500; }
  .tab:hover:not(.active) { color:var(--text); }

  /* QUICK TOPICS */
  .quick-topics { display:flex; gap:7px; padding:9px 18px; overflow-x:auto; border-bottom:1px solid var(--border); flex-shrink:0; scrollbar-width:none; background:var(--surface); }
  .quick-topics::-webkit-scrollbar{display:none}
  .topic-chip { flex-shrink:0; padding:5px 13px; border-radius:20px; border:1px solid var(--border); background:var(--bg); color:var(--text-muted); font-size:0.74rem; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .topic-chip:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }

  /* SCREENS */
  .screen { display:none; flex:1; overflow:hidden; flex-direction:column; }
  .screen.active { display:flex; }

  /* MESSAGES */
  .messages { flex:1; overflow-y:auto; padding:18px 18px; display:flex; flex-direction:column; gap:13px; position:relative; z-index:1; scrollbar-width:thin; scrollbar-color:var(--border) transparent; }
  .message { display:flex; gap:9px; animation:fadeUp 0.3s ease; max-width:84%; }
  @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .message.user { align-self:flex-end; flex-direction:row-reverse; }
  .message.bot { align-self:flex-start; }
  .msg-avatar { width:28px; height:28px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:12px; margin-top:3px; overflow:hidden; }
  .msg-avatar.bot-av { border:1.5px solid var(--border); box-shadow:0 2px 8px rgba(181,101,29,0.12); background:#fff; }
  .msg-avatar.bot-av img { width:100%; height:100%; object-fit:cover; }
  .msg-avatar.user-av { background:var(--user-bubble); }
  .bubble { padding:11px 15px; border-radius:var(--radius); font-size:0.855rem; line-height:1.7; max-width:100%; }
  .message.bot .bubble { background:var(--surface); border:1px solid var(--border); border-radius:4px var(--radius) var(--radius) var(--radius); color:var(--text); box-shadow:0 2px 8px rgba(42,31,20,0.05); }
  .message.user .bubble { background:var(--user-bubble); border-radius:var(--radius) 4px var(--radius) var(--radius); color:#f7f0e8; }
  .bubble strong { color:var(--accent); font-weight:500; }
  .message.user .bubble strong { color:#f0c898; }
  .bubble ul { margin:7px 0 3px 16px; display:flex; flex-direction:column; gap:4px; }
  .bubble li::marker { color:var(--accent); }

  /* SPECIAL BUBBLES */
  .bubble-card { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; margin-top:4px; box-shadow:0 2px 8px rgba(42,31,20,0.05); }
  .bubble-card h4 { font-family:'Playfair Display',serif; font-size:0.95rem; color:var(--text); margin-bottom:10px; }

  /* CHECKLIST */
  .checklist-item { display:flex; align-items:flex-start; gap:9px; padding:7px 0; border-bottom:1px solid var(--surface2); font-size:0.82rem; }
  .checklist-item:last-child { border-bottom:none; }
  .checklist-item input[type=checkbox] { margin-top:2px; accent-color:var(--accent); width:15px; height:15px; flex-shrink:0; cursor:pointer; }
  .checklist-item label { cursor:pointer; line-height:1.4; color:var(--text); flex:1; }
  .checklist-item input:checked + label { text-decoration:line-through; color:var(--text-muted); }
  .checklist-section { display:flex; align-items:center; justify-content:space-between; font-size:0.72rem; font-weight:600; letter-spacing:0.08em; text-transform:uppercase; color:var(--accent); margin:10px 0 4px; }
  .edit-inline { background:var(--bg); border:1px solid var(--border); border-radius:7px; padding:3px 8px; font-family:'Outfit',sans-serif; font-size:0.82rem; color:var(--text); flex:1; }
  .edit-inline:focus { outline:none; border-color:var(--accent); }
  .icon-btn { background:none; border:none; cursor:pointer; font-size:13px; padding:2px 4px; opacity:0.45; transition:opacity 0.2s; flex-shrink:0; }
  .icon-btn:hover { opacity:1; }
  .add-item-row { display:flex; gap:7px; margin-top:8px; padding-top:8px; border-top:1px dashed var(--border); }
  .add-item-input { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:7px 11px; font-family:'Outfit',sans-serif; font-size:0.8rem; color:var(--text); }
  .add-item-input:focus { outline:none; border-color:var(--accent); }
  .add-item-btn { padding:7px 13px; border-radius:9px; background:var(--accent-dim); border:1px solid var(--accent); color:var(--accent); font-size:0.78rem; font-family:'Outfit',sans-serif; cursor:pointer; }
  .add-section-row { display:flex; gap:7px; margin-top:12px; }

  /* BUDGET */
  .budget-row { display:flex; justify-content:space-between; align-items:center; padding:6px 0; border-bottom:1px solid var(--surface2); font-size:0.82rem; gap:8px; }
  .budget-row:last-child { border-bottom:none; font-weight:600; color:var(--accent); }
  .budget-row span:last-child { font-weight:500; }
  .budget-name-input { flex:1; background:transparent; border:none; font-family:'Outfit',sans-serif; font-size:0.82rem; color:var(--text); padding:2px 4px; border-radius:5px; }
  .budget-name-input:focus { outline:none; background:var(--bg); border:1px solid var(--border); }
  .budget-val-input { width:90px; background:transparent; border:none; font-family:'Outfit',sans-serif; font-size:0.82rem; color:var(--text); text-align:right; padding:2px 4px; border-radius:5px; font-weight:500; }
  .budget-val-input:focus { outline:none; background:var(--bg); border:1px solid var(--border); }

  /* TIMELINE */
  .timeline-item { display:flex; gap:12px; padding:6px 0; font-size:0.82rem; align-items:flex-start; }
  .timeline-time { flex-shrink:0; font-weight:600; color:var(--accent); width:52px; font-size:0.78rem; }
  .timeline-time-input { width:80px; min-width:80px; background:transparent; border:none; font-family:'Outfit',sans-serif; font-size:0.78rem; color:var(--accent); font-weight:600; padding:1px 3px; border-radius:5px; }
  .timeline-time-input:focus { outline:none; background:var(--bg); border:1px solid var(--border); }
  .timeline-dot { flex-shrink:0; width:8px; height:8px; border-radius:50%; background:var(--accent); margin-top:5px; }
  .timeline-text { color:var(--text); line-height:1.4; flex:1; }
  .timeline-text-input { flex:1; background:transparent; border:none; font-family:'Outfit',sans-serif; font-size:0.82rem; color:var(--text); line-height:1.4; padding:1px 3px; border-radius:5px; width:100%; }
  .timeline-text-input:focus { outline:none; background:var(--bg); border:1px solid var(--border); }

  /* ACTION BUTTONS inside chat */
  .action-btns { display:flex; flex-wrap:wrap; gap:7px; margin-top:10px; }
  .action-btn { padding:6px 13px; border-radius:14px; border:1px solid var(--border); background:var(--bg); color:var(--text); font-size:0.76rem; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; }
  .action-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); }
  .action-btn.primary { background:var(--accent); color:#fff; border-color:var(--accent); }
  .action-btn.primary:hover { background:var(--accent2); }

  /* CONTACT FORM inside chat */
  .contact-form { display:flex; flex-direction:column; gap:8px; margin-top:4px; }
  .contact-form input, .contact-form select { background:var(--bg); border:1px solid var(--border); border-radius:9px; padding:9px 12px; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.82rem; transition:border-color 0.2s; }
  .contact-form input:focus, .contact-form select:focus { outline:none; border-color:var(--accent); }
  .contact-form input::placeholder { color:var(--text-muted); }

  /* TYPING */
  .typing-indicator { display:flex; gap:5px; align-items:center; padding:12px 15px; background:var(--surface); border:1px solid var(--border); border-radius:4px var(--radius) var(--radius) var(--radius); width:fit-content; }
  .typing-dot { width:6px; height:6px; border-radius:50%; background:var(--accent2); animation:bounce 1.2s infinite; }
  .typing-dot:nth-child(2){animation-delay:.2s} .typing-dot:nth-child(3){animation-delay:.4s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-6px);opacity:1}}

  /* INPUT */
  .input-area { padding:12px 18px 15px; border-top:1px solid var(--border); background:var(--surface); flex-shrink:0; position:relative; z-index:10; box-shadow:0 -1px 8px rgba(42,31,20,0.04); }
  .input-row { display:flex; gap:9px; align-items:flex-end; }
  textarea { flex:1; background:var(--bg); border:1px solid var(--border); border-radius:11px; padding:10px 14px; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.855rem; resize:none; min-height:44px; max-height:110px; line-height:1.5; transition:border-color 0.2s,box-shadow 0.2s; }
  textarea:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(181,101,29,0.08); }
  textarea::placeholder { color:var(--text-muted); }
  .send-btn { width:44px; height:44px; border-radius:11px; background:var(--accent); border:none; color:#fff; cursor:pointer; display:flex; align-items:center; justify-content:center; flex-shrink:0; transition:all 0.2s; font-size:16px; box-shadow:0 4px 10px rgba(181,101,29,0.28); }
  .send-btn:hover{background:var(--accent2);transform:scale(1.05);}
  .send-btn:active{transform:scale(0.97);}
  .send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
  .input-hint { font-size:0.64rem; color:var(--text-muted); text-align:center; margin-top:7px; letter-spacing:0.03em; }

  /* WELCOME */
  .welcome-banner { text-align:center; padding:16px 14px 6px; animation:fadeUp 0.5s ease; }
  .welcome-logo { width:62px; height:62px; border-radius:50%; margin:0 auto 10px; overflow:hidden; background:#fff; border:2px solid var(--border); box-shadow:0 4px 14px rgba(181,101,29,0.16); }
  .welcome-logo img{width:100%;height:100%;object-fit:cover;}
  .welcome-banner h2 { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:600; color:var(--text); margin-bottom:3px; }
  .welcome-banner .slogan-tag { display:inline-block; font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--accent2); font-weight:400; margin-bottom:7px; }
  .welcome-banner p { font-size:0.8rem; color:var(--text-muted); line-height:1.65; font-weight:300; }
  .event-selector { display:flex; flex-wrap:wrap; gap:7px; margin-top:12px; justify-content:center; }
  .event-btn { padding:7px 15px; border-radius:20px; border:1.5px solid var(--border); background:var(--surface); color:var(--text); font-size:0.79rem; font-family:'Outfit',sans-serif; cursor:pointer; transition:all 0.2s; }
  .event-btn:hover { border-color:var(--accent); color:var(--accent); background:var(--accent-dim); transform:translateY(-1px); }

  /* LEADS PANEL */
  .leads-screen { flex:1; overflow-y:auto; padding:16px 18px; background:var(--bg); }
  .leads-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .leads-header h3 { font-family:'Playfair Display',serif; font-size:1.1rem; color:var(--text); }
  .leads-count { font-size:0.75rem; color:var(--text-muted); background:var(--surface2); padding:3px 10px; border-radius:10px; }
  .lead-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:13px 15px; margin-bottom:10px; box-shadow:0 2px 6px rgba(42,31,20,0.04); }
  .lead-card .lead-name { font-weight:600; font-size:0.9rem; color:var(--text); margin-bottom:5px; }
  .lead-card .lead-details { display:flex; flex-wrap:wrap; gap:8px; }
  .lead-tag { font-size:0.72rem; padding:3px 9px; border-radius:10px; background:var(--surface2); color:var(--text-muted); }
  .lead-tag.event { background:var(--accent-dim); color:var(--accent); }
  .lead-date { font-size:0.68rem; color:var(--text-muted); margin-top:6px; }
  .lead-wa { display:inline-flex; align-items:center; gap:5px; margin-top:7px; padding:5px 12px; border-radius:9px; background:#25d366; color:#fff; font-size:0.74rem; text-decoration:none; font-weight:500; }
  .no-leads { text-align:center; padding:40px 20px; color:var(--text-muted); font-size:0.85rem; }
  .clear-btn { font-size:0.72rem; padding:5px 12px; border-radius:8px; border:1px solid var(--border); background:transparent; color:var(--text-muted); cursor:pointer; }
  .clear-btn:hover { border-color:var(--danger); color:var(--danger); }

  .messages::-webkit-scrollbar{width:3px;} .messages::-webkit-scrollbar-track{background:transparent;} .messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
  .leads-screen::-webkit-scrollbar{width:3px;} .leads-screen::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="header-banner" id="headerBanner"></div>
  <div class="header-overlay"></div>
  <div class="header-content">
    <div class="logo-wrap"><img id="headerLogo" src="" alt="CRD"></div>
    <div class="header-info">
      <h1>By Cristian Romero Digital</h1>
      <div class="slogan" id="header-slogan">Tu fotógrafo amigo</div>
    </div>
    <div class="header-right">
      <div class="lang-toggle">
        <button class="lang-btn active" onclick="setLang('es')">ES</button>
        <button class="lang-btn" onclick="setLang('en')">EN</button>
      </div>
      <button class="panel-btn" onclick="showLeads()" id="panelBtnHeader">📋 Leads</button>
      <div class="status-dot"><div class="dot"></div><span>Online</span></div>
    </div>
  </div>
</header>

<div class="tabs" id="tabsBar">
  <button class="tab active" id="tab-chat" onclick="switchTab('chat')">💬 <span id="tab-chat-label">Chat</span></button>
  <button class="tab" id="tab-checklist" onclick="switchTab('checklist')">✅ Checklist</button>
  <button class="tab" id="tab-budget" onclick="switchTab('budget')">💰 <span id="tab-budget-label">Presupuesto</span></button>
  <button class="tab" id="tab-timeline" onclick="switchTab('timeline')">📅 Timeline</button>
  <button class="tab" id="tab-leads" onclick="switchTab('leads')">👥 Leads</button>
</div>

<div class="quick-topics" id="quickTopics"></div>

<!-- CHAT SCREEN -->
<div class="screen active" id="screen-chat">
  <div class="messages" id="messages"></div>
  <div class="input-area">
    <div class="input-row">
      <textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
    <p class="input-hint" id="inputHint">Enter para enviar · Shift+Enter para nueva línea</p>
  </div>
</div>

<!-- CHECKLIST SCREEN -->
<div class="screen" id="screen-checklist">
  <div class="messages" id="checklist-container" style="padding:16px 18px;">
    <div class="bubble-card" id="checklist-card">
      <h4 id="checklist-title">📋 Checklist del Evento</h4>
      <div id="checklist-select-msg" style="font-size:0.83rem;color:var(--text-muted);padding:10px 0;">
        Primero seleccioná un tipo de evento en el chat para generar tu checklist personalizado.
      </div>
      <div id="checklist-items"></div>
    </div>
  </div>
</div>

<!-- BUDGET SCREEN -->
<div class="screen" id="screen-budget">
  <div class="messages" style="padding:16px 18px;">
    <div class="bubble-card">
      <h4 id="budget-title">💰 Estimador de Presupuesto</h4>
      <div style="display:flex;gap:10px;margin-bottom:12px;margin-top:8px;flex-wrap:wrap;">
        <div style="flex:1;min-width:120px;">
          <label style="font-size:0.72rem;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:4px;" id="budget-guests-label">Invitados</label>
          <input type="number" id="budget-guests" min="10" max="1000" value="100" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:Outfit,sans-serif;font-size:0.85rem;color:var(--text);" oninput="calcBudget()">
        </div>
        <div style="flex:1;min-width:120px;">
          <label style="font-size:0.72rem;color:var(--text-muted);letter-spacing:0.05em;text-transform:uppercase;display:block;margin-bottom:4px;" id="budget-level-label">Nivel</label>
          <select id="budget-level" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:8px 12px;font-family:Outfit,sans-serif;font-size:0.85rem;color:var(--text);" onchange="calcBudget()">
            <option value="basic" id="opt-basic">Económico</option>
            <option value="mid" selected id="opt-mid">Intermedio</option>
            <option value="premium" id="opt-premium">Premium</option>
          </select>
        </div>
      </div>
      <div id="budget-rows"></div>
    </div>
  </div>
</div>

<!-- TIMELINE SCREEN -->
<div class="screen" id="screen-timeline">
  <div class="messages" style="padding:16px 18px;">
    <div class="bubble-card">
      <h4 id="timeline-title">📅 Timeline del Evento</h4>
      <div style="display:flex;gap:8px;margin:10px 0 14px;flex-wrap:wrap;">
        <input type="time" id="tl-start" value="17:00" style="background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-family:Outfit,sans-serif;font-size:0.83rem;color:var(--text);" onchange="genTimeline()">
        <select id="tl-event" style="flex:1;background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:7px 11px;font-family:Outfit,sans-serif;font-size:0.83rem;color:var(--text);" onchange="genTimeline()">

async function saveLeadToStorage(lead) {
  try {
    const existing = await window.storage.get('romebot-leads').catch(()=>null);
    const leads = existing ? JSON.parse(existing.value) : [];
    leads.unshift(lead);
    await window.storage.set('romebot-leads', JSON.stringify(leads), true);
  } catch(e) { console.error('Storage error:', e); }
}

async function getLeads() {
  try {
    const r = await window.storage.get('romebot-leads', true);
    return r ? JSON.parse(r.value) : [];
  } catch(e) { return []; }
}

async function saveClientMemory(data) {
  try {
    await window.storage.set('romebot-client', JSON.stringify(data));
  } catch(e) {}
}

async function getClientMemory() {
  try {
    const r = await window.storage.get('romebot-client');
    return r ? JSON.parse(r.value) : null;
  } catch(e) { return null; }
}

function switchTab(tab) {
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(`screen-${tab}`).classList.add('active');
  document.getElementById(`tab-${tab}`).classList.add('active');
  if(tab==='leads') renderLeads();
  if(tab==='checklist') renderChecklist();
  if(tab==='budget') calcBudget();
  if(tab==='timeline') genTimeline();
  document.getElementById('quickTopics').style.display = tab==='chat' ? 'flex' : 'none';
}

function showLeads() { switchTab('leads'); }

// ── LANG ─────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  document.getElementById('header-slogan').textContent = content[lang].headerSlogan;
  document.getElementById('userInput').placeholder = content[lang].placeholder;
  document.getElementById('inputHint').textContent = content[lang].inputHint;
  // Update budget labels
  const bl = content[lang].budgetLabels;
  document.getElementById('budget-title').textContent = bl.title;
  document.getElementById('budget-guests-label').textContent = bl.guestsLabel;
  document.getElementById('budget-level-label').textContent = bl.levelLabel;
  document.getElementById('opt-basic').textContent = bl.basic;
  document.getElementById('opt-mid').textContent = bl.mid;
  document.getElementById('opt-premium').textContent = bl.premium;
  document.getElementById('timeline-title').textContent = content[lang].timelineLabels.title;
  document.getElementById('checklist-title').textContent = content[lang].checklistLabels.title;
  document.getElementById('tab-budget-label').textContent = lang==='es'?'Presupuesto':'Budget';
  document.getElementById('tab-chat-label').textContent = lang==='es'?'Chat':'Chat';
  renderTopics();
  resetChat(lang);
  renderLeads();
  calcBudget();
  genTimeline();
}

// ── CHAT RESET ───────────────────────────────────────────
function resetChat(lang) {
  conversationHistory = [];
  currentEventType = null;
  const msgs = document.getElementById('messages');
  msgs.innerHTML = `
    <div class="welcome-banner" id="welcomeBanner">
      <div class="welcome-logo"><img src="${logoSrc}" alt="CRD"></div>
      <h2 id="welcome-title">${content[lang].welcomeTitle}</h2>
      <div class="slogan-tag" id="welcome-slogan">${content[lang].welcomeSlogan}</div>
      <p id="welcome-sub">${content[lang].welcomeSub.replace('\n','<br>')}</p>
      <div class="event-selector" id="eventSelector"></div>
    </div>`;
  renderEventTypes();
  // Load memory
  getClientMemory().then(mem => {
    if(mem && mem.lang === lang) {
      const returning = lang==='es'
        ? `¡Bienvenido de vuelta **${mem.name||''}**! 👋 Sigo teniendo tu info: estabas organizando un **${mem.event||'evento'}**. ¿Seguimos donde lo dejamos?`
        : `Welcome back **${mem.name||''}**! 👋 I still have your info: you were planning a **${mem.event||'event'}**. Shall we continue?`;
      setTimeout(()=>addMessage('bot', fmt(returning)), 400);
    } else {
      setTimeout(()=>addMessage('bot', fmt(content[lang].greeting)), 400);
    }
  });
}

// ── TOPICS & EVENTS ──────────────────────────────────────
function renderTopics() {
  const c=document.getElementById('quickTopics'); c.innerHTML='';
  content[currentLang].topics.forEach(t=>{
    const chip=document.createElement('button'); chip.className='topic-chip'; chip.textContent=t;
    chip.onclick=()=>quickSend(t.replace(/^.{2}/,'').trim()); c.appendChild(chip);
  });
}

function renderEventTypes() {
  const c=document.getElementById('eventSelector'); if(!c) return; c.innerHTML='';
  content[currentLang].eventTypes.forEach(e=>{
    const btn=document.createElement('button'); btn.className='event-btn'; btn.textContent=e;
    btn.onclick=()=>selectEvent(e); c.appendChild(btn);
  });
}

function selectEvent(e) {
  currentEventType = e;
  document.getElementById('welcomeBanner')?.remove();
  const msg=currentLang==='es'?`Estoy organizando: ${e}`:`I'm planning: ${e}`;
  addMessage('user',msg); conversationHistory.push({role:'user',content:msg}); fetchAI(msg);
  // update timeline selector
  const map = {'💍':'wedding','🎂':'birthday','🥂':'quince','🏢':'corporate'};
  const key = Object.keys(map).find(k=>e.includes(k));
  if(key) { document.getElementById('tl-event').value = map[key]; genTimeline(); }
  renderChecklist();
}

function quickSend(t){
  if(t.toLowerCase().includes('checklist')||t.toLowerCase().includes('checklist')){switchTab('checklist');return;}
  document.getElementById('userInput').value=t; sendMessage();
}

// ── CHECKLIST ────────────────────────────────────────────
let checklistData = {}; // { sectionName: [items...] }

function renderChecklist() {
  const container = document.getElementById('checklist-items');
  const msg = document.getElementById('checklist-select-msg');
  const c = content[currentLang].checklistLabels;
  const map = {'💍':'wedding','🎂':'birthday','🥂':'quince','🏢':'corporate'};
  const key = currentEventType ? Object.keys(map).find(k=>currentEventType.includes(k)) : null;
  checklistData = JSON.parse(JSON.stringify(key ? c[map[key]] : c['wedding']));
  msg && (msg.style.display = currentEventType?'none':'block');
  renderChecklistDOM();
}

function renderChecklistDOM() {
  const container = document.getElementById('checklist-items');
  container.innerHTML='';
  let idx=0;
  Object.entries(checklistData).forEach(([section, items], si)=>{
    // Section header with editable name + add item btn
    const secWrap = document.createElement('div'); secWrap.className='checklist-section';
    const secInput = document.createElement('input'); secInput.className='edit-inline';
    secInput.value=section; secInput.style.fontSize='0.72rem'; secInput.style.fontWeight='600';
    secInput.style.letterSpacing='0.08em'; secInput.style.textTransform='uppercase';
    secInput.addEventListener('change', function(){
      const keys=Object.keys(checklistData); const vals=Object.values(checklistData);
      const newData={}; keys.forEach((k,i)=>{ newData[i===si?this.value:k]=vals[i]; });
      checklistData=newData; renderChecklistDOM();
    });
    const delSecBtn = document.createElement('button'); delSecBtn.className='icon-btn'; delSecBtn.textContent='🗑️';
    delSecBtn.title='Eliminar sección'; delSecBtn.onclick=()=>{ delete checklistData[section]; renderChecklistDOM(); };
    secWrap.appendChild(secInput); secWrap.appendChild(delSecBtn);
    container.appendChild(secWrap);

    items.forEach((item, ii)=>{
      const row=document.createElement('div'); row.className='checklist-item';
      const id=`chk-${idx++}`;
      const saved = localStorage.getItem(id)==='1';
      const cb=document.createElement('input'); cb.type='checkbox'; cb.id=id; if(saved) cb.checked=true;
      cb.style.marginTop='2px'; cb.style.accentColor='var(--accent)'; cb.style.width='15px'; cb.style.height='15px'; cb.style.flexShrink='0';
      cb.addEventListener('change',function(){localStorage.setItem(id,this.checked?'1':'0');});
      const lbl=document.createElement('input'); lbl.className='edit-inline'; lbl.value=item;
      lbl.style.fontSize='0.82rem';
      lbl.addEventListener('change',function(){ checklistData[section][ii]=this.value; });
      const delBtn=document.createElement('button'); delBtn.className='icon-btn'; delBtn.textContent='✕';
      delBtn.onclick=()=>{ checklistData[section].splice(ii,1); renderChecklistDOM(); };
      row.appendChild(cb); row.appendChild(lbl); row.appendChild(delBtn);
      container.appendChild(row);
    });

    // Add item row per section
    const addRow=document.createElement('div'); addRow.className='add-item-row';
    const addInp=document.createElement('input'); addInp.className='add-item-input';
    addInp.placeholder=currentLang==='es'?'+ Nueva tarea...':'+ New task...';
    const addBtn=document.createElement('button'); addBtn.className='add-item-btn';
    addBtn.textContent=currentLang==='es'?'Agregar':'Add';
    addBtn.onclick=()=>{ const v=addInp.value.trim(); if(!v) return; checklistData[section].push(v); renderChecklistDOM(); };
    addInp.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();addBtn.click();} });
    addRow.appendChild(addInp); addRow.appendChild(addBtn);
    container.appendChild(addRow);
  });

  // Add section row
  const secRow=document.createElement('div'); secRow.className='add-section-row'; secRow.style.marginTop='14px';
  const secInp=document.createElement('input'); secInp.className='add-item-input';
  secInp.placeholder=currentLang==='es'?'+ Nueva sección...':'+ New section...';
  const secBtn=document.createElement('button'); secBtn.className='add-item-btn';
  secBtn.textContent=currentLang==='es'?'Agregar sección':'Add section';
  secBtn.onclick=()=>{ const v=secInp.value.trim(); if(!v||checklistData[v]) return; checklistData[v]=[]; renderChecklistDOM(); };
  secRow.appendChild(secInp); secRow.appendChild(secBtn);
  container.appendChild(secRow);
}

// ── BUDGET ───────────────────────────────────────────────
let budgetItems = []; // [{name, value}]

function calcBudget() {
  const guests = parseInt(document.getElementById('budget-guests').value)||100;
  const level = document.getElementById('budget-level').value;
  const bl = content[currentLang].budgetLabels;
  const multipliers = {basic:1, mid:2.2, premium:4.5};
  const m = multipliers[level];
  const base = [3500,4500,1800,2000,1500,800,1200,400];
  const perGuest = [1800,1200,0,0,0,300,0,0];
  budgetItems = bl.categories.slice(0,8).map((cat,i)=>({
    name: cat,
    value: Math.round((base[i] + perGuest[i]*guests) * m / 100) * 100
  }));
  renderBudgetDOM();
}

function renderBudgetDOM() {
  const bl = content[currentLang].budgetLabels;
  const rows = document.getElementById('budget-rows');
  rows.innerHTML='';
  let total=0;
  budgetItems.forEach((item, i)=>{
    total += item.value;
    const row=document.createElement('div'); row.className='budget-row';
    const nameInp=document.createElement('input'); nameInp.className='budget-name-input'; nameInp.value=item.name;
    nameInp.addEventListener('change',function(){ budgetItems[i].name=this.value; });
    const valInp=document.createElement('input'); valInp.className='budget-val-input'; valInp.value='$'+item.value.toLocaleString();
    valInp.addEventListener('focus',function(){ this.value=item.value; });
    valInp.addEventListener('change',function(){
      const v=parseInt(this.value.replace(/\D/g,''))||0;
      budgetItems[i].value=v; renderBudgetDOM();
    });
    const delBtn=document.createElement('button'); delBtn.className='icon-btn'; delBtn.textContent='✕';
    delBtn.onclick=()=>{ budgetItems.splice(i,1); renderBudgetDOM(); };
    row.appendChild(nameInp); row.appendChild(valInp); row.appendChild(delBtn);
    rows.appendChild(row);
  });
  const contingency = Math.round(total*0.1/100)*100;
  total+=contingency;

  // Contingency row (editable label, auto value)
  const contRow=document.createElement('div'); contRow.className='budget-row';
  contRow.innerHTML=`<span style="color:var(--text-muted);font-size:0.78rem;">${bl.categories[8]}</span><span style="color:var(--text-muted);">$${contingency.toLocaleString()}</span>`;
  rows.appendChild(contRow);

  // Total row
  const totRow=document.createElement('div'); totRow.className='budget-row';
  totRow.innerHTML=`<span>${bl.total}</span><span>$${total.toLocaleString()}</span>`;
  rows.appendChild(totRow);

  // Add item row
  const addRow=document.createElement('div'); addRow.className='add-item-row'; addRow.style.marginTop='10px';
  const nameI=document.createElement('input'); nameI.className='add-item-input'; nameI.placeholder=currentLang==='es'?'Nuevo rubro...':'New item...';
  const valI=document.createElement('input'); valI.className='add-item-input'; valI.placeholder='$0'; valI.style.width='80px';
  const addB=document.createElement('button'); addB.className='add-item-btn'; addB.textContent='+';
  addB.onclick=()=>{
    const n=nameI.value.trim(); const v=parseInt(valI.value.replace(/\D/g,''))||0;
    if(!n) return; budgetItems.push({name:n,value:v}); nameI.value=''; valI.value=''; renderBudgetDOM();
  };
  addRow.appendChild(nameI); addRow.appendChild(valI); addRow.appendChild(addB);
  rows.appendChild(addRow);
}

// ── TIMELINE ─────────────────────────────────────────────
let timelineItems = []; // [{time, label}]

function genTimeline() {
  const startTime = document.getElementById('tl-start').value || '17:00';
  const eventType = document.getElementById('tl-event').value;
  const [h,m] = startTime.split(':').map(Number);
  const lang = currentLang;
  const timelines = {
    wedding: (lang==='es') ? [
      [-180,'Llegada del fotógrafo y preparativos finales 📸'],[-120,'Arreglo de novia / novio'],[-60,'Llegada de invitados'],[0,'Ceremonia'],[60,'Cóctel y sesión de fotos'],[150,'Ingreso al salón'],[180,'Primer vals y cena'],[240,'Baile y festejos'],[360,'Torta y brindis'],[420,'Cierre del evento']
    ] : [
      [-180,'Photographer arrival & final prep 📸'],[-120,'Bride/groom getting ready'],[-60,'Guests arrive'],[0,'Ceremony'],[60,'Cocktail & photo session'],[150,'Reception entrance'],[180,'First dance & dinner'],[240,'Dancing & festivities'],[360,'Cake & toast'],[420,'Event closing']
    ],
    birthday: (lang==='es') ? [
      [-60,'Preparativos y decoración final'],[0,'Inicio de la fiesta'],[60,'Bienvenida y aperitivos'],[120,'Cena'],[180,'Torta y festejo'],[210,'Baile y entretenimiento'],[300,'Cierre']
    ] : [
      [-60,'Final prep & decoration'],[0,'Party starts'],[60,'Welcome & appetizers'],[120,'Dinner'],[180,'Cake & celebration'],[210,'Dancing & entertainment'],[300,'Closing']
    ],
    quince: (lang==='es') ? [
      [-120,'Fotografías de preparación 📸'],[-60,'Llegada de invitados'],[0,'Ingreso de la quinceañera'],[30,'Vals y coreografía'],[90,'Cena'],[150,'Sorpresas y shows'],[210,'Baile libre'],[300,'Torta y brindis'],[360,'Cierre']
    ] : [
      [-120,'Preparation photos 📸'],[-60,'Guests arrive'],[0,'Quinceañera entrance'],[30,'Waltz & choreography'],[90,'Dinner'],[150,'Surprises & shows'],[210,'Open dancing'],[300,'Cake & toast'],[360,'Closing']
    ],
    corporate: (lang==='es') ? [
      [-60,'Montaje y prueba técnica'],[0,'Apertura y acreditación'],[30,'Palabras de bienvenida'],[60,'Presentaciones'],[150,'Coffee break'],[180,'Sesión principal'],[270,'Almuerzo / Cóctel'],[330,'Workshops'],[420,'Cierre y networking']
    ] : [
      [-60,'Setup & tech rehearsal'],[0,'Opening & registration'],[30,'Welcome remarks'],[60,'Presentations'],[150,'Coffee break'],[180,'Main session'],[270,'Lunch / Cocktail'],[330,'Workshops'],[420,'Closing & networking']
    ]
  };
  const tl = timelines[eventType] || timelines.wedding;
  timelineItems = tl.map(([offset, label])=>{
    let mins = h*60+m+offset; if(mins<0) mins+=24*60;
    const hh=String(Math.floor(mins/60)%24).padStart(2,'0');
    const mm=String(mins%60).padStart(2,'0');
    return {time:`${hh}:${mm}`, label};
  });
  renderTimelineDOM();
}

function renderTimelineDOM() {
  const container = document.getElementById('timeline-items');
  container.innerHTML='';
  timelineItems.forEach((item, i)=>{
    const row=document.createElement('div'); row.className='timeline-item';
    const timeInp=document.createElement('input'); timeInp.type='time'; timeInp.className='timeline-time-input';
    timeInp.value=item.time;
    timeInp.addEventListener('change',function(){ timelineItems[i].time=this.value; });
    const dot=document.createElement('div'); dot.className='timeline-dot'; dot.style.marginTop='6px';
    const textInp=document.createElement('input'); textInp.className='timeline-text-input'; textInp.value=item.label;
    textInp.addEventListener('change',function(){ timelineItems[i].label=this.value; });
    const delBtn=document.createElement('button'); delBtn.className='icon-btn'; delBtn.textContent='✕'; delBtn.style.marginTop='1px';
    delBtn.onclick=()=>{ timelineItems.splice(i,1); renderTimelineDOM(); };
    row.appendChild(timeInp); row.appendChild(dot); row.appendChild(textInp); row.appendChild(delBtn);
    container.appendChild(row);
  });
  // Add item row
  const addRow=document.createElement('div'); addRow.className='add-item-row'; addRow.style.marginTop='10px';
  const timeI=document.createElement('input'); timeI.type='time'; timeI.className='add-item-input'; timeI.style.width='80px';
  const labelI=document.createElement('input'); labelI.className='add-item-input';
  labelI.placeholder=currentLang==='es'?'Nueva actividad...':'New activity...';
  const addB=document.createElement('button'); addB.className='add-item-btn'; addB.textContent='+';
  addB.onclick=()=>{
    const t=timeI.value||'00:00'; const l=labelI.value.trim(); if(!l) return;
    timelineItems.push({time:t,label:l}); timelineItems.sort((a,b)=>a.time.localeCompare(b.time));
    labelI.value=''; renderTimelineDOM();
  };
  addRow.appendChild(timeI); addRow.appendChild(labelI); addRow.appendChild(addB);
  container.appendChild(addRow);
}

async function submitContact() {
  const name  = document.getElementById('cf-name')?.value.trim();
  const event = document.getElementById('cf-event')?.value.trim();
  const date  = document.getElementById('cf-date')?.value;
  const phone = document.getElementById('cf-phone')?.value.trim();
  if(!name){ alert(currentLang==='es'?'Por favor ingresá tu nombre.':'Please enter your name.'); return; }

  // Save lead
  const lead = { name, event, date, phone, lang:currentLang, ts: new Date().toISOString() };
  await saveLeadToStorage(lead);
  await saveClientMemory({ name, event, lang: currentLang });

  // Remove form
  document.getElementById('contact-form-wrap')?.remove();
  addMessage('bot', fmt(content[currentLang].contactThanks(name)));
  // WhatsApp button
  if(phone) {
    const wa = document.createElement('div'); wa.className='message bot';
    const av2=document.createElement('div'); av2.className='msg-avatar bot-av';
    const img2=document.createElement('img'); img2.src=logoSrc; av2.appendChild(img2);
    const bub=document.createElement('div'); bub.className='bubble';
    const link=document.createElement('a'); link.className='lead-wa';
    const msg = encodeURIComponent(`¡Hola ${name}! Soy Cristian Romero Digital. Vi tu consulta sobre ${event||'tu evento'} 📸`);
    link.href=`https://wa.me/${phone.replace(/\D/g,'')}?text=${msg}`; link.target='_blank';
    link.innerHTML='<span>💬</span> WhatsApp';
    bub.appendChild(link); wa.appendChild(av2); wa.appendChild(bub);
    document.getElementById('messages').appendChild(wa);
    document.getElementById('messages').scrollTop=99999;
  }
}

async function renderLeads() {
  const leads = await getLeads();
  const ll = content[currentLang].leadsLabels;
  document.getElementById('leads-title').textContent = ll.title;
  document.getElementById('leads-count').textContent = ll.count(leads.length);
  document.getElementById('clear-btn-label').textContent = ll.clear;
  const list = document.getElementById('leads-list');
  if(leads.length===0){
    list.innerHTML=`<div class="no-leads">${ll.noLeads.replace('\n','<br>')}</div>`; return;
  }
  list.innerHTML='';
  leads.forEach(l=>{
    const card=document.createElement('div'); card.className='lead-card';
    const d=new Date(l.ts); const dateStr=d.toLocaleDateString(currentLang==='es'?'es-AR':'en-US',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
    let waBtn = l.phone ? `<a class="lead-wa" href="https://wa.me/${l.phone.replace(/\D/g,'')}?text=${encodeURIComponent(`¡Hola ${l.name}! Soy Cristian Romero Digital 📸`)}" target="_blank">💬 WhatsApp</a>` : '';
    card.innerHTML=`
      <div class="lead-name">${l.name||'—'}</div>
      <div class="lead-details">
        ${l.event?`<span class="lead-tag event">${l.event}</span>`:''}
        ${l.date?`<span class="lead-tag">📅 ${l.date}</span>`:''}
        ${l.phone?`<span class="lead-tag">📱 ${l.phone}</span>`:''}
      </div>
      ${waBtn}
      <div class="lead-date">${dateStr}</div>`;
    list.appendChild(card);
  });
}

async function clearLeads() {
  const ll = content[currentLang].leadsLabels;
  if(!confirm(currentLang==='es'?'¿Confirmar borrado de todos los leads?':'Confirm clearing all leads?')) return;
  try { await window.storage.delete('romebot-leads', true); } catch(e){}

}

function showTyping(){

function hideTyping(){document.getElementById('typing-wrap')?.remove();}

function fmt(text){
  return text
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.*?)\*/g,'<em>$1</em>')
    .replace(/^[-•]\s(.+)/gm,'<li>$1</li>')
    .replace(/((<li>.*<\/li>\n?)+)/g,'<ul>$1</ul>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
}

function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,110)+'px';}
function handleKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

// ── AI FETCH ─────────────────────────────────────────────
async function fetchAI(userText){
  isLoading=true; document.getElementById('sendBtn').disabled=true; showTyping();
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:content[currentLang].systemPrompt,messages:conversationHistory})
    });
    const data=await res.json(); hideTyping();
    const raw=data.content?.[0]?.text||(currentLang==='es'?'Ocurrió un error. Intentá de nuevo.':'An error occurred.');
    conversationHistory.push({role:'assistant',content:raw});
    if(raw.includes('[MOSTRAR_FORMULARIO]')){
      const clean=raw.replace('[MOSTRAR_FORMULARIO]','').trim();
      if(clean) addMessage('bot',fmt(clean));
      showContactForm();
    } else {
      addMessage('bot',fmt(raw));
    }
  }catch(err){
    hideTyping(); addMessage('bot',currentLang==='es'?'Ups, problema de conexión. Intentá de nuevo.':'Oops, connection issue. Please try again.');
  }
  isLoading=false; document.getElementById('sendBtn').disabled=false; document.getElementById('userInput').focus();
}

async function sendMessage(){
  if(isLoading) return;
  const input=document.getElementById('userInput'); const text=input.value.trim(); if(!text) return;
  document.getElementById('welcomeBanner')?.remove();
  addMessage('user',text); input.value=''; input.style.height='auto';
  conversationHistory.push({role:'user',content:text}); fetchAI(text);
}

// ── INIT ─────────────────────────────────────────────────
renderTopics();
resetChat('es');
calcBudget();
genTimeline();
</script>
